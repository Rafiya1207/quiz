<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
</head>

<body>
  <header>
    <h1>Quiz</h1>
  </header>
  <main>
    <article>
      <form action="" method="post">
        <fieldset>
          <legend>
            <h2>1. What is the capital of India?</h2>
          </legend>
          <input type="radio" name="answer" value="New Delhi" id="option-1">
          <label for="new-delhi">New Delhi</label>
          <input type="radio" name="answer" value="Bangalore" id="option-2">
          <label for="bangalore">Bangalore</label>
          <input type="radio" name="answer" value="Hyderabad" id="option-3">
          <label for="hyderabad">Hyderabad</label>
          <button type="submit">Next</button>
        </fieldset>
      </form>
    </article>
  </main>
</body>

</html>
